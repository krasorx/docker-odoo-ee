# Configuración de módulos adicionales para Odoo 19 Enterprise
#
# Formato: <url> -b <rama> <ruta-local>
#
#   - La ruta local define dónde se clona dentro de addons/
#   - Usa el patrón ORG/repo para mantener el árbol organizado
#   - Líneas que comienzan con # son ignoradas
#
# Ejemplo:
#   git@github.com:OCA/purchase-workflow.git -b 19.0 OCA/purchase-workflow
#   git@github.com:OCA/web.git -b 19.0 OCA/web
#   git@github.com:miempresa/mis-addons.git -b main miempresa/mis-addons
#
# IMPORTANTE: El módulo Enterprise (ee-addons/enterprise) NO se gestiona aquí.
# Clónalo manualmente: git clone git@github.com:odoo/enterprise.git -b 19.0 ee-addons/enterprise

