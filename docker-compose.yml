services:
  odoo:
    container_name: odoo_${PROJECT_NAME}
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo.conf.template:/etc/odoo/odoo.conf.template:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./requirements.txt:/requirements.txt:ro
      # Módulos comunitarios (clonados por setup.sh)
      - ./addons:/mnt/extra-addons
      # Módulos Enterprise (el usuario los clona manualmente)
      - ./ee-addons/enterprise:/mnt/extra-addons/enterprise
    entrypoint: /entrypoint.sh
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - ODOO_ADMIN_PASSWORD=${ODOO_ADMIN_PASSWORD}
    env_file:
      - .env
    networks:
      - odoo_net
      - traefik_net
    labels:
      - traefik.enable=true
      # ── HTTP principal (8069) ──────────────────────────────────────────────
      - traefik.http.routers.${PROJECT_NAME}.rule=Host(`${MAIN_HOST}`)
      - traefik.http.routers.${PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${PROJECT_NAME}.tls=true
      - traefik.http.routers.${PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.routers.${PROJECT_NAME}.service=odoo_${PROJECT_NAME}
      - traefik.http.services.odoo_${PROJECT_NAME}.loadbalancer.server.port=8069
      # ── WebSocket / longpolling (8072) ─────────────────────────────────────
      - traefik.http.routers.${PROJECT_NAME}-ws.rule=Host(`${MAIN_HOST}`) && PathPrefix(`/websocket`)
      - traefik.http.routers.${PROJECT_NAME}-ws.entrypoints=websecure
      - traefik.http.routers.${PROJECT_NAME}-ws.tls=true
      - traefik.http.routers.${PROJECT_NAME}-ws.tls.certresolver=letsencrypt
      - traefik.http.routers.${PROJECT_NAME}-ws.service=odoo_${PROJECT_NAME}-ws
      - traefik.http.services.odoo_${PROJECT_NAME}-ws.loadbalancer.server.port=8072

  postgres:
    container_name: postgres_${PROJECT_NAME}
    image: postgres:17-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=32MB
      -c max_connections=50
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - odoo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  odoo_net:
  traefik_net:
    external: true

volumes:
  db_data:
  odoo_data:
